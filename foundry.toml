[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "prague"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "forge-std/=lib/forge-std/src/",
    "solady/=lib/solady/src/",
    "justanaccount/=lib/justanaccount/src/",
    "safe-singleton-deployer-sol/=lib/justanaccount/lib/safe-singleton-deployer-sol/",
    "@account-abstraction/=lib/justanaccount/lib/account-abstraction/contracts/",
    "@solarity/=lib/solidity-lib/contracts/"
]

optimizer = true
optimizer_runs = 200
via_ir = true

[fuzz]
runs = 256

[fmt]
# Line length configuration
line_length = 120
# Indentation and spacing
tab_width = 4
bracket_spacing = true
# String formatting
quote_style = "double"
# Integer type formatting
int_types = "long"
# Number formatting
number_underscore = "thousands"
# Function header formatting
multiline_func_header = "all"
# Import organization
sort_imports = true
# Override spacing
override_spacing = true
# Contract spacing
contract_new_lines = true
# Statement blocks
single_line_statement_blocks = "multi"

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
